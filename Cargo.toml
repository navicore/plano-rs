[workspace]
members = [
    "crates/api",
    "crates/core",
    "crates/rds-sync",
    "crates/bin/server",
    "crates/bin/sync-cli",
]
resolver = "2"

[workspace.package]
edition = "2021"

[workspace.dependencies]
tonic = "0.11"
prost = "0.12"
tokio = { version = "1", features = ["full"] }
arrow = "55"
datafusion = "46"
sqlx = { version = "0.7", features = ["runtime-tokio", "postgres", "chrono"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
tracing = "0.1"
