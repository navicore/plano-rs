[workspace]
members = [
    "crates/api",
    "crates/core",
    "crates/rds-sync",
    "crates/bin/server",
    "crates/bin/sync-cli",
]
resolver = "2"

[workspace.package]
edition = "2024"

[workspace.dependencies]
anyhow = "1"
arrow = {version = "55" }
clap = "4.5"
datafusion = "46"
parquet = { version = "55", features = ["arrow"] }
prost = "0.13"
serde = { version = "1", features = ["derive"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "postgres", "chrono"] }
tokio = { version = "1", features = ["full"] }
tonic = "0.13"
tracing = "0.1"
tracing-subscriber = "0.3"
